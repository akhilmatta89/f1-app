<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="login-page">
    <!-- Navigation Bar -->
    <nav class="navbar">
    <div class="logo-container">
        <a href="/">
            <img src="{{ url_for('static',filename='images/main_f1_logo.png')}}" alt="F1 Logo">
        </a>
    </div>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/login">Login</a></li>
            <li><a href="/about">About</a></li>
        </ul>
    </nav>

    <div class="auth-page_container">

    <div class="login-form-container">
        <div class="login-form">

            <!-- LOGIN VIEW -->
            <div id="login-view">

                <h2>Login</h2>

                <div class="input-group">
                    <input type="email" id="email-input" placeholder="Email">
                </div>

                <div class="input-group">
                    <input type="password" id="password-input" placeholder="Password">
                </div>

                <button id="sign-in-btn" class="login-btn">Sign In</button>

                <div class="alt-signin-divider">OR</div>

                <button id="sign-in-with-google-btn" class="google-login-btn">
                    Sign in with Google
                </button>

                <div class="signup-link-container">
                    Don't have an account? <a href="/register">Sign up</a>
                </div>

                <div class="signup-link-container">
                    <a href="#" id="forgot-password-link">Forgot Password?</a>
                </div>

            </div>

            <!-- RESET VIEW -->
            <div id="reset-view" style="display:none;">

                <h2>Reset Password</h2>

                <div class="input-group">
                    <input type="email" id="email-forgot-password" placeholder="Enter your email">
                </div>

                <button id="forgot-password-btn" class="login-btn">
                    Send Reset Link
                </button>

                <div class="signup-link-container">
                    <a href="#" id="back-to-login">Back to Login</a>
                </div>

            </div>

        </div>
    </div>

</div>

    <script src="{{ url_for('static', filename='login-auth.js') }}" type="module"></script>
    <script src="{{ url_for('static', filename='scripts.js') }}" type="module"></script>
</body>
</html>
